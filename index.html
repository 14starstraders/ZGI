<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>14 Star Traders | Premium Quality Products</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --gold: #d4af37;
    --dark: #0f172a;
    --light: #f8fafc;
    --accent: #e2e8f0;
    --shadow: 0 10px 30px rgba(0,0,0,0.1);
    --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
}

* { margin:0; padding:0; box-sizing:border-box; font-family: 'Montserrat', sans-serif; }
body { background: var(--light); color: var(--dark); overflow-x: hidden; }

/* --- CATEGORY POP-UP STYLE --- */
#catPopup {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5);
    background: rgba(15, 23, 42, 0.9); color: white; padding: 20px 40px; border-radius: 50px;
    font-size: 18px; font-weight: 600; text-transform: uppercase; letter-spacing: 3px;
    z-index: 5000; opacity: 0; pointer-events: none; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    backdrop-filter: blur(10px); border: 1px solid var(--gold);
}
#catPopup.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

.top-bar { background: var(--dark); color: white; text-align: center; padding: 10px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; border-bottom: 2px solid var(--gold); }

header {
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
    padding: 20px 50px; background: white; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--accent);
}

.logo { font-family: 'Playfair Display', serif; font-size: 28px; letter-spacing: 2px; font-weight: 700; color: var(--dark); cursor: pointer; }
.logo span { color: var(--gold); }
.search-box { display: flex; align-items: center; }
.search { border: none; border-bottom: 1px solid #ddd; padding: 8px; font-size: 13px; outline: none; transition: 0.3s; width: 200px; }
.search:focus { border-color: var(--gold); width: 250px; }
.right { display: flex; justify-content: flex-end; gap: 25px; align-items: center; }
.cart { position: relative; cursor: pointer; font-size: 22px; transition: 0.3s; }

#cartCount {
    position: absolute; top: -8px; right: -10px; background: var(--gold); color: var(--dark);
    font-size: 10px; width: 18px; height: 18px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-weight: 700;
}

.categories { display: flex; justify-content: center; gap: 15px; padding: 25px; background: #fff; border-bottom: 1px solid var(--accent); flex-wrap: wrap; }
.categories button {
    border: 1px solid var(--accent); background: white; padding: 10px 25px; border-radius: 5px;
    font-size: 12px; font-weight: 600; text-transform: uppercase; cursor: pointer; transition: var(--transition);
}
.categories button:hover { background: var(--dark); color: white; }

#backBtn {
    display: none; margin: 20px 50px; padding: 10px 20px; background: var(--dark);
    color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: 600;
}

.hero { height: 40vh; background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)), url("https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=2070") center/cover; display: flex; align-items: center; justify-content: center; color: white; text-align: center; }

.products { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; padding: 40px 50px; }
.card { background: white; transition: var(--transition); border: 1px solid var(--accent); border-radius: 8px; overflow: hidden; text-align: center; padding-bottom: 20px; cursor: pointer; }
.card:hover { transform: translateY(-5px); box-shadow: var(--shadow); }

/* --- CATEGORY/PRODUCT IMAGE BOX FIX --- */
.p-img-container { 
    width: 100%; 
    height: 250px; 
    overflow: hidden; 
    background: #fff; 
    padding: 10px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
}

.card img { 
    max-width: 100%; 
    max-height: 100%; 
    object-fit: contain; 
    transition: var(--transition);
}

@media (max-width: 768px) {
    .p-img-container {
        height: 180px; 
    }
}

.info h3 { font-size: 14px; font-weight: 700; text-transform: uppercase; margin: 15px 0 10px; padding: 0 10px; }
.price { font-weight: 700; font-size: 18px; margin-bottom: 20px; }

.qty-btn-group {
    display: flex; align-items: center; justify-content: center;
    max-width: 180px; margin: 0 auto; background: #f8fafc; border-radius: 5px; border: 1px solid #eee;
}
.qty-btn-group button {
    flex: 1; padding: 10px; border: none; background: none;
    cursor: pointer; font-size: 18px; color: #666; transition: 0.2s;
}
.qty-btn-group button:hover { color: var(--gold); }
.qty-btn-group span { flex: 1; font-weight: 600; color: var(--dark); }

/* --- MODAL & CART --- */
.product-modal { position: fixed; inset: 0; background: white; z-index: 3000; display: none; padding: 40px; overflow-y: auto; }
.product-modal.active { display: block; animation: slideIn 0.4s ease-out; }
@keyframes slideIn { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-close { position: fixed; top: 20px; right: 30px; font-size: 35px; cursor: pointer; z-index: 3001; }
.modal-content { max-width: 1100px; margin: 40px auto; display: grid; grid-template-columns: 1fr 1fr; gap: 50px; }
.modal-left img { width: 100%; border: 1px solid var(--accent); border-radius: 8px; }

.cartBox { position: fixed; right: -100%; top: 0; width: 400px; height: 100%; background: white; box-shadow: -10px 0 40px rgba(0,0,0,0.1); padding: 30px; z-index: 2000; transition: 0.5s; }
.cartBox.active { right: 0; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 1500; }
.overlay.active { display: block; }

/* New Cart Item Styles */
.cart-item { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #f1f5f9; }
.cart-item-img { width: 70px; height: 70px; object-fit: contain; border: 1px solid #eee; border-radius: 5px; }
.cart-item-info { flex: 1; }
.cart-item-qty { display: flex; align-items: center; gap: 10px; background: #f8fafc; padding: 5px 10px; border-radius: 5px; border: 1px solid #eee; width: fit-content; margin-top: 5px; }
.cart-item-qty button { border: none; background: none; cursor: pointer; font-weight: 700; color: #666; }

@media (max-width: 768px) {
    header { padding: 15px 20px; grid-template-columns: 1fr auto; }
    .search-box { display: none; }
    .products { padding: 15px; grid-template-columns: 1fr 1fr; gap: 10px; }
    .cartBox { width: 100%; }
}
</style>
</head>

<body>
<div id="catPopup">Category</div>
<div class="top-bar">Welcome to 14 Star Traders | Quality Products at Best Prices</div>
<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<header>
    <div class="search-box">
        <i class="fa-solid fa-magnifying-glass" style="font-size: 13px; margin-right: 10px;"></i>
        <input class="search" placeholder="Search products..." onkeyup="searchProduct()">
    </div>
    <div class="logo" onclick="location.reload()">ZAINABYA <span>GROUP</span> ISLAMIC</div>
    <div class="right">
        <div class="cart" onclick="toggleCart()">
            <i class="fa-solid fa-cart-shopping"></i>
            <span id="cartCount">0</span>
        </div>
    </div>
</header>

<div class="categories">
    <button onclick="filter('all')">All</button>
    <button onclick="filter('essential')">ESSENTIALS</button>
    <button onclick="filter('care')">Personal Care</button>
</div>

<section class="hero" id="heroSection">
    <div>
        <p style="text-transform: uppercase; letter-spacing: 5px; font-size: 12px;">Top Rated Essentials</p>
        <h1 style="font-family:'Playfair Display'; font-size:40px;">14 STAR COLLECTIONS</h1>
    </div>
</section>

<button id="backBtn" onclick="renderMainFolders()">← BACK TO ALL COLLECTIONS</button>

<section class="products" id="productsGrid"></section>

<div class="product-modal" id="productModal">
    <span class="modal-close" onclick="closeSpec()">&times;</span>
    <div class="modal-content">
        <div class="modal-left"><img id="specImg" src=""></div>
        <div class="modal-right">
            <h2 id="specName">Product Name</h2>
            <div class="m-price" id="specPrice">Rs. 000</div>
            <p class="m-desc" id="specDesc">Description here...</p>
            <button style="width:100%; padding:20px; background:var(--dark); color:white; border:none; font-weight:700; cursor:pointer;" onclick="closeSpec()">GO BACK TO SHOP</button>
        </div>
    </div>
</div>

<div class="cartBox" id="cartBox">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h2 style="font-family:'Playfair Display';">Your Shopping Bag</h2>
        <i class="fa-solid fa-xmark" onclick="toggleCart()" style="cursor:pointer; font-size:24px;"></i>
    </div>
    <div id="cartItems"></div>
    <div class="total" style="margin-top:20px; border-top:1px solid #eee; padding-top:20px;">
        <span>Total Amount:</span>
        <span>Rs. <span id="totalPrice">0</span></span>
    </div>
    <button style="width:100%; margin-top:30px; background:var(--gold); color:var(--dark); padding:18px; border:none; cursor:pointer; font-weight:700;">CHECKOUT NOW</button>
</div>

<script>
let cart = {};
let total = 0;

const pattiDesigns = [
    {id: 'p1', name: "Patti Design 1", price: 200, img: "SAJDAGAH.webp", desc: "Premium Patti Style 1", cat: "essential"},
    {id: 'p2', name: "Patti Design 2", price: 250, img: "FLAG.webp", desc: "Premium Patti Style 2", cat: "essential"},
    {id: 'p2', name: "Patti Design 2", price: 250, img: "FLAG.webp", desc: "Premium Patti Style 2", cat: "essential"}
];

const mainFolders = [
    {name: "SAJDAGAH", img: "SAJDAGAH.webp", type: "", data: pattiDesigns, cat: "essential"},
    {name: "Flag Collection", img: "FLAG.webp", type: "folder", data: pattiDesigns, cat: "essential"},
    {name: "Tasbeeh Collection", img: "TAZBEEH.jpg", type: "folder", data: pattiDesigns, cat: "essential"},
    {name: "Clock Collection", img: "CATALOG.webp", type: "folder", data: pattiDesigns, cat: "essential"},
    {name: "Essentials 1", img: "SAJDAGAH.webp", type: "folder", data: pattiDesigns, cat: "essential"},
    {name: "Essentials 2", img: "FLAG.webp", type: "folder", data: pattiDesigns, cat: "essential"},
    {name: "Care Folder 1", img: "TAZBEEH.jpg", type: "folder", data: pattiDesigns, cat: "care"},
    {name: "Care Folder 2", img: "CATALOG.webp", type: "folder", data: pattiDesigns, cat: "care"},
    {name: "Extra Folder 1", img: "SAJDAGAH.webp", type: "folder", data: pattiDesigns, cat: "essential"},
    {name: "Extra Folder 2", img: "FLAG.webp", type: "folder", data: pattiDesigns, cat: "essential"},
    {name: "Decor Folder 1", img: "TAZBEEH.jpg", type: "folder", data: pattiDesigns, cat: "care"},
    {name: "Decor Folder 2", img: "CATALOG.webp", type: "folder", data: pattiDesigns, cat: "care"},
    {name: "Gift Folder 1", img: "SAJDAGAH.webp", type: "folder", data: pattiDesigns, cat: "essential"},
    {name: "Gift Folder 2", img: "FLAG.webp", type: "folder", data: pattiDesigns, cat: "essential"}
];

function renderMainFolders(cat = 'all') {
    const grid = document.getElementById('productsGrid');
    const hero = document.getElementById('heroSection');
    const backBtn = document.getElementById('backBtn');
    grid.innerHTML = "";
    hero.style.display = "flex";
    backBtn.style.display = "none";
    mainFolders.forEach(folder => {
        if(cat === 'all' || folder.cat === cat) {
            grid.innerHTML += `
                <div class="card" onclick="renderDesigns('${folder.name}')">
                    <div class="p-img-container"><img src="${folder.img}"></div>
                    <div class="info">
                        <h3>${folder.name}</h3>
                        <p style="color:var(--gold); font-size:12px; font-weight:600;">VIEW DESIGNS</p>
                    </div>
                </div>`;
        }
    });
}

function renderDesigns(folderName) {
    const folder = mainFolders.find(f => f.name === folderName);
    const grid = document.getElementById('productsGrid');
    const hero = document.getElementById('heroSection');
    const backBtn = document.getElementById('backBtn');
    grid.innerHTML = "";
    hero.style.display = "none";
    backBtn.style.display = "block";
    window.scrollTo(0,0);
    folder.data.forEach(item => {
        grid.innerHTML += `
            <div class="card">
                <div class="p-img-container" onclick="openSpec('${item.name}', '${item.price}', '${item.img}', '${item.desc}')">
                    <img src="${item.img}">
                </div>
                <div class="info">
                    <h3>${item.name}</h3>
                    <div class="price">Rs. ${item.price}</div>
                    <div class="qty-btn-group">
                        <button onclick="updateQty('${item.id}', -1, '${item.name}', ${item.price}, '${item.img}')">-</button>
                        <span id="qty-${item.id}">${cart[item.id] ? cart[item.id].qty : 0}</span>
                        <button onclick="updateQty('${item.id}', 1, '${item.name}', ${item.price}, '${item.img}')">+</button>
                    </div>
                </div>
            </div>`;
    });
}

function filter(cat){
    renderMainFolders(cat);
    let popup = document.getElementById('catPopup');
    popup.innerText = cat == 'all' ? 'All Collections' : cat.toUpperCase();
    popup.classList.add('show');
    setTimeout(() => { popup.classList.remove('show'); }, 800);
}

function updateQty(id, change, name, price, img) {
    let currentQty = cart[id] ? cart[id].qty : 0;
    let newQty = currentQty + change;
    if(newQty >= 0) {
        if(document.getElementById(`qty-${id}`)) document.getElementById(`qty-${id}`).innerText = newQty;
        if(newQty > 0) cart[id] = { name, price, qty: newQty, img };
        else delete cart[id];
        renderCart();
    }
}

function renderCart() {
    let html = ""; total = 0; let count = 0;
    for(let id in cart) {
        let item = cart[id];
        total += (item.price * item.qty); count += item.qty;
        html += `<div class="cart-item">
                    <img src="${item.img}" class="cart-item-img">
                    <div class="cart-item-info">
                        <p style="font-weight:600; font-size:14px; margin-bottom:2px;">${item.name}</p>
                        <p style="color:var(--gold); font-size:12px; font-weight:600;">Rs. ${item.price}</p>
                        <div class="cart-item-qty">
                            <button onclick="updateQty('${id}', -1, '${item.name}', ${item.price}, '${item.img}')">-</button>
                            <span>${item.qty}</span>
                            <button onclick="updateQty('${id}', 1, '${item.name}', ${item.price}, '${item.img}')">+</button>
                        </div>
                    </div>
                    <p style="font-weight:700; color:var(--dark);">Rs. ${item.price * item.qty}</p>
                 </div>`;
    }
    document.getElementById("cartItems").innerHTML = html || "<p style='text-align:center; color:#999;'>Your bag is empty</p>";
    document.getElementById("totalPrice").innerText = total;
    document.getElementById("cartCount").innerText = count;
}

function openSpec(name, price, img, desc) {
    document.getElementById('specName').innerText = name;
    document.getElementById('specPrice').innerText = "Rs. " + price;
    document.getElementById('specImg').src = img;
    document.getElementById('specDesc').innerText = desc;
    document.getElementById('productModal').classList.add('active');
    document.body.style.overflow = 'hidden';
}
function closeSpec() { document.getElementById('productModal').classList.remove('active'); document.body.style.overflow = 'auto'; }
function toggleCart(){ document.getElementById("cartBox").classList.toggle("active"); document.getElementById("overlay").classList.toggle("active"); }
function searchProduct(){
    let input = document.querySelector(".search").value.toLowerCase();
    let cards = document.querySelectorAll(".card h3");
    cards.forEach(cardTitle => {
        let card = cardTitle.closest('.card');
        card.style.display = cardTitle.innerText.toLowerCase().includes(input) ? "block" : "none";
    });
}
renderMainFolders();
</script>
</body>
</html>
